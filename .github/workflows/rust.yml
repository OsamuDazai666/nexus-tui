name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # Optional but highly recommended: caches Rust dependencies to make builds much faster
    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2

    # Check that the code formatting follows Rust standards
    - name: Check Formatting
      run: cargo fmt -- --check

    # Run Clippy to catch common mistakes and unidiomatic code
    - name: Clippy Lints
      run: cargo clippy --all-targets --all-features

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
