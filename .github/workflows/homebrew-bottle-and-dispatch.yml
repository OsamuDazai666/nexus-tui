name: Homebrew Bottle And Dispatch

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag like v0.1.1"
        required: true
        type: string

jobs:
  bottle-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name || inputs.release_tag }}"
          if [[ -z "$tag" ]]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"

      - name: Download Linux dist archive from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p target/distrib
          gh release download "${{ steps.tag.outputs.value }}" \
            --repo "${{ github.repository }}" \
            --pattern "ani-nexus-tui-x86_64-unknown-linux-gnu.tar.xz" \
            --dir target/distrib

      - name: Build and upload Homebrew bottle asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ./scripts/create_homebrew_linux_bottle.sh "${{ steps.tag.outputs.value }}" target/distrib
          bottle_path="$(find target/distrib -maxdepth 1 -type f -name 'ani-nexus-tui--*.x86_64_linux.bottle.tar.gz' | head -n1)"
          if [[ -z "$bottle_path" ]]; then
            echo "Homebrew bottle artifact was not generated" >&2
            exit 1
          fi
          gh release upload "${{ steps.tag.outputs.value }}" "$bottle_path" --repo "${{ github.repository }}" --clobber

      - name: Dispatch update event to tap repo
        env:
          TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          if [[ -z "${TAP_REPO}" || -z "${TAP_TOKEN}" ]]; then
            echo "Missing required secrets: HOMEBREW_TAP_REPO and/or HOMEBREW_TAP_TOKEN"
            exit 1
          fi

          payload="$(jq -cn \
            --arg event_type "update-formula" \
            --arg release_tag "${RELEASE_TAG}" \
            '{event_type: $event_type, client_payload: {release_tag: $release_tag}}')"

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TAP_TOKEN}" \
            "https://api.github.com/repos/${TAP_REPO}/dispatches" \
            -d "${payload}"
