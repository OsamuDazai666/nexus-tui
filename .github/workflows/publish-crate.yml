name: Publish Crate

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always
  CRATE_NAME: ani-nexus-tui

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate tag matches Cargo.toml version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r --arg crate "$CRATE_NAME" '.packages[] | select(.name == $crate) | .version')"

          if [[ -z "${crate_version}" || "${crate_version}" == "null" ]]; then
            echo "Failed to determine crate version for ${CRATE_NAME}" >&2
            exit 1
          fi

          if [[ "${tag_version}" != "${crate_version}" ]]; then
            echo "Tag version (${tag_version}) does not match Cargo.toml version (${crate_version})" >&2
            exit 1
          fi

          echo "crate_version=${crate_version}" >> "${GITHUB_OUTPUT}"

      - name: Check whether version already exists on crates.io
        id: cratesio
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.crate_version }}"
          url="https://crates.io/api/v1/crates/${CRATE_NAME}/${version}"

          if curl --silent --show-error --fail "${url}" > /tmp/crate-version.json; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
            echo "${CRATE_NAME} ${version} is already published; skipping cargo publish."
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Run release checks
        if: steps.cratesio.outputs.published != 'true'
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --verbose
          cargo package --locked

      - name: Publish to crates.io
        if: steps.cratesio.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"
